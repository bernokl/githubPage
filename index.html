<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Loading...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            color: #333;
            background: #f5f5f5;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            background: white;
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 1rem;
            border-bottom: 3px solid #3498db;
            padding-bottom: 0.5rem;
        }
        h2 {
            color: #34495e;
            margin-top: 2rem;
            margin-bottom: 1rem;
        }
        p {
            margin-bottom: 1rem;
            color: #555;
        }
        .section {
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: #fafafa;
            border-left: 4px solid #3498db;
            border-radius: 4px;
        }
        .description {
            font-style: italic;
            color: #7f8c8d;
            margin-bottom: 2rem;
        }
        .section-image {
            width: 100%;
            max-width: 400px;
            height: auto;
            border-radius: 8px;
            margin: 1rem 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: block;
        }
        .image-container {
            position: relative;
            display: inline-block;
            margin: 1rem 0;
        }
        /* Tooltip styles */
        .tooltip {
            position: relative;
            display: inline-block;
            cursor: help;
        }
        .tooltip .tooltiptext {
            visibility: hidden;
            width: 200px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 6px;
            padding: 8px 12px;
            position: absolute;
            z-index: 1000;
            bottom: 125%;
            left: 50%;
            margin-left: -100px;
            opacity: 0;
            transition: opacity 0.3s;
            font-size: 14px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .tooltip .tooltiptext::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: #333 transparent transparent transparent;
        }
        .tooltip:hover .tooltiptext {
            visibility: visible;
            opacity: 1;
        }
        .tooltip-image {
            border-radius: 4px;
            transition: transform 0.2s;
        }
        .tooltip-image:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="site-title">Loading...</h1>
        <p class="description" id="site-description"></p>
        <div id="sections"></div>
    </div>
    <script>
        // Load content from JSON with cache-busting
        // Add timestamp to prevent browser caching
        const cacheBuster = '?v=' + new Date().getTime();
        fetch('content/pages.json' + cacheBuster, {
            cache: 'no-store',
            headers: {
                'Cache-Control': 'no-cache'
            }
        })
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                // Set page title and description
                document.getElementById('page-title').textContent = data.title;
                document.getElementById('site-title').textContent = data.title;
                document.getElementById('site-description').textContent = data.description;
                
                // Render sections
                const sectionsContainer = document.getElementById('sections');
                sectionsContainer.innerHTML = ''; // Clear existing content
                data.sections.forEach(section => {
                    const sectionDiv = document.createElement('div');
                    sectionDiv.className = 'section';
                    
                    let imageHTML = '';
                    if (section.image) {
                        if (section.tooltip) {
                            // Image with tooltip
                            imageHTML = `
                                <div class="image-container">
                                    <span class="tooltip">
                                        <img src="${section.image}" alt="${section.title}" class="section-image tooltip-image">
                                        <span class="tooltiptext">${section.tooltip}</span>
                                    </span>
                                </div>
                            `;
                        } else {
                            // Image without tooltip
                            imageHTML = `<img src="${section.image}" alt="${section.title}" class="section-image">`;
                        }
                    }
                    
                    // Support for tooltips on text content
                    let contentHTML = section.content;
                    if (section.contentTooltip) {
                        contentHTML = `
                            <span class="tooltip">
                                ${section.content}
                                <span class="tooltiptext">${section.contentTooltip}</span>
                            </span>
                        `;
                    }
                    
                    sectionDiv.innerHTML = `
                        <h2>${section.title}</h2>
                        ${imageHTML}
                        <p>${contentHTML}</p>
                    `;
                    sectionsContainer.appendChild(sectionDiv);
                });
            })
            .catch(error => {
                console.error('Error loading content:', error);
                document.getElementById('site-title').textContent = 'Error loading content';
                document.getElementById('site-description').textContent = 'Please check the browser console for details.';
            });
    </script>
</body>
</html>
