<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Loading...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            color: #333;
            background: #f5f5f5;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            background: white;
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 1rem;
            border-bottom: 3px solid #3498db;
            padding-bottom: 0.5rem;
        }
        h2 {
            color: #34495e;
            margin-top: 2rem;
            margin-bottom: 1rem;
        }
        p {
            margin-bottom: 1rem;
            color: #555;
        }
        .section {
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: #fafafa;
            border-left: 4px solid #3498db;
            border-radius: 4px;
        }
        .description {
            font-style: italic;
            color: #7f8c8d;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="site-title">Loading...</h1>
        <p class="description" id="site-description"></p>
        <div id="sections"></div>
    </div>
    <script>
        // Load content from JSON
        fetch('content/pages.json')
            .then(response => response.json())
            .then(data => {
                // Set page title and description
                document.getElementById('page-title').textContent = data.title;
                document.getElementById('site-title').textContent = data.title;
                document.getElementById('site-description').textContent = data.description;
                
                // Render sections
                const sectionsContainer = document.getElementById('sections');
                data.sections.forEach(section => {
                    const sectionDiv = document.createElement('div');
                    sectionDiv.className = 'section';
                    sectionDiv.innerHTML = `
                        <h2>${section.title}</h2>
                        <p>${section.content}</p>
                    `;
                    sectionsContainer.appendChild(sectionDiv);
                });
            })
            .catch(error => {
                console.error('Error loading content:', error);
                document.getElementById('site-title').textContent = 'Error loading content';
            });
    </script>
</body>
</html>
